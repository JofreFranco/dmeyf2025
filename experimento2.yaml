# Configuración del experimento Experimento1
experiment:
  name: ""
  tag: "0.5_50"
  debug: false
  sample_ratio: 0.5
  n_trials: 50

hyperparameters:
  num_leaves:
    type: "int"
    min: 8
    max: 100
  learning_rate:
    type: "float" 
    min: 0.001
    max: 0.3
  min_data_in_leaf:
    type: "int"
    min: 5
    max: 10000
  feature_fraction:
    type: "float"
    min: 0.01
    max: 1.0
  bagging_fraction:
    type: "float"
    min: 0.01
    max: 1.0

data:
  train_months: [202101, 202102, 202103, 202104]
  test_month: 202105
  eval_month: 202106

preprocessing:
  lag_transformer:
    n_lags: 1
